<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- DaisyUI and Tailwind CSS setup-->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google fonts setup-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!--  CSS setup -->
    <link rel="stylesheet" href="init.tailwind.css" />
    <title>GitHub Issue Tracker Home</title>
  </head>
  <body>
    <!-- == Loading Spinner == -->
    <div
      id="global-loader"
      class="hidden fixed inset-0 bg-white/70 backdrop-blur-sm z-[10] flex items-center justify-center"
    >
      <div class="flex flex-col items-center">
        <span class="loading loading-spinner loading-lg text-[#5A00FF]"></span>
        <p
          class="mt-4 text-slate-500 font-bold animate-pulse text-xs uppercase tracking-widest"
        >
          Please Wait...
        </p>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
